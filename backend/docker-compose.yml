services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postly
      POSTGRES_PASSWORD: postly
      POSTGRES_DB: postly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postly:postly@db:5432/postly
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-me
      BACKEND_CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    # Create tables + seed roles on first boot, then serve.
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
