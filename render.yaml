# Render Blueprint — Postly backend (FastAPI + PostgreSQL).
# Deploy: Render Dashboard -> New + -> Blueprint -> pick this repo.
# After it applies, set FRONTEND_URL and BACKEND_CORS_ORIGINS in the Render UI.
# (Redis is intentionally omitted — rate limiting degrades gracefully without it.)

databases:
  - name: postly-db
    databaseName: postly
    user: postly
    plan: free

services:
  - type: web
    name: postly-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin the tested Python version (Render's default 3.13 can lack some wheels).
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: postly-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
